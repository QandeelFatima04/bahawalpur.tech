services:
  db:
    image: postgres:16
    container_name: careerbridgeai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: careerbridge
      POSTGRES_USER: careerbridge
      POSTGRES_PASSWORD: careerbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerbridge -d careerbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    container_name: careerbridgeai-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.docker
    environment:
      DATABASE_URL: postgresql+psycopg2://careerbridge:careerbridge@db:5432/careerbridge
    # Resilient startup: try alembic upgrade first; if it fails (e.g. because the DB was
    # bootstrapped via Base.metadata.create_all and has no alembic_version row), fall back
    # to stamping head. The startup() hook in main.py runs create_all to fill any gaps.
    # Uvicorn always starts so we get logs even when migrations cannot be applied.
    command: >
      sh -c "
      echo '--- alembic upgrade head ---' &&
      (alembic upgrade head || (echo '--- upgrade failed, stamping head ---' && alembic stamp head)) ;
      echo '--- starting uvicorn ---' &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        # Empty = browser hits same origin; Next.js rewrites proxy to the api container.
        # Override to a public API URL (e.g. https://api.bahawalpur.tech) only if you have
        # the API exposed on its own subdomain.
        NEXT_PUBLIC_API_BASE: ""
    container_name: careerbridgeai-web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
